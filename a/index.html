<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base66 URL Shortener</title>
    <!-- 外部のCSSファイルとQRライブラリをスマートに読み込む -->
    <link rel="stylesheet" href="./style.css">
    <script src="./qrcode.min.js" defer></script>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1 class="app-title">Base66 URL Shortener<span class="app-badge">v1.0</span></h1>
        <p class="app-subtitle">独自の66進数数学による最高効率の次世代URL短縮ツール</p>
    </div>
    
    <label class="input-label">短縮したいURLを入力</label>
    <div class="input-group">
        <select id="protocolSelect">
            <option value="https://">https://</option>
            <option value="http://">http://</option>
        </select>
        <input type="text" id="urlInput" placeholder="example.com" />
    </div>
    
    <button id="generateBtn" class="action-btn">短縮URLを生成する</button>
    
    <div id="resultArea" class="result-box" style="display:none;">
        <div class="result-title">✨ 短縮URLの生成に成功しました！</div>
        
        <div class="short-url-container">
            <button id="copyBtn" class="copy-btn">URLをクリップボードにコピー</button>
            <a id="shortUrlText" class="short-url-link" href="#" target="_blank"></a>
        </div>
        
        <div class="qr-container">
            <div class="qr-title">スマートフォン読み取り用QRコード</div>
            <div id="qrcode"></div>
            <button id="downloadBtn" class="download-btn">QRコード画像を保存</button>
        </div>
    </div>
</div>

<script>
// --- URL安全なBase66暗号化システム ---
const BASE66_CHARS = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-._~";

function encodeBase66(str) {
    const encoder = new TextEncoder();
    const bytes = encoder.encode(str);
    let num = 0n;
    for (let i = 0; i < bytes.length; i++) {
        num = (num << 8n) + BigInt(bytes[i]);
    }
    if (num === 0n) return BASE66_CHARS;
    
    let result = "";
    while (num > 0n) {
        const remainder = Number(num % 66n);
        result = BASE66_CHARS[remainder] + result;
        num = num / 66n;
    }
    return result;
}

// 入力時の自動プロトコル連動
document.getElementById('urlInput').addEventListener('input', (e) => {
    let value = e.target.value.trim();
    if (/^https:\/\//i.test(value)) {
        document.getElementById('protocolSelect').value = "https://";
        e.target.value = value.replace(/^https:\/\//i, '');
    } else if (/^http:\/\//i.test(value)) {
        document.getElementById('protocolSelect').value = "http://";
        e.target.value = value.replace(/^http:\/\//i, '');
    }
});

document.getElementById('generateBtn').addEventListener('click', () => {
    if (typeof QRCode === 'undefined') {
        alert('ライブラリの読み込み中です。しばらく待ってからもう一度お試しください。');
        return;
    }

    const urlInput = document.getElementById('urlInput');
    const protocolSelect = document.getElementById('protocolSelect');
    const resultArea = document.getElementById('resultArea');
    const shortUrlText = document.getElementById('shortUrlText');
    const qrcodeDiv = document.getElementById('qrcode');
    
    let rawInput = urlInput.value.trim();
    if (!rawInput) { alert('URLを入力してください'); return; }

    rawInput = rawInput.replace(/^https?:\/\//i, '');

    try {
        const protocolFlag = (protocolSelect.value === "https://") ? "s|" : "h|";
        const compressed = encodeBase66(protocolFlag + rawInput);
        
        const currentPath = window.location.origin + window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
        const shortUrl = `${currentPath}/a?=${compressed}`;

        shortUrlText.innerText = shortUrl;
        shortUrlText.href = shortUrl;

        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, {
            text: shortUrl,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        resultArea.style.display = 'block';

    } catch (e) {
        alert('変換中にエラーが発生しました。');
    }
});

// コピペボタンの処理
document.getElementById('copyBtn').addEventListener('click', () => {
    const shortUrl = document.getElementById('shortUrlText').innerText;
    const copyBtn = document.getElementById('copyBtn');
    
    navigator.clipboard.writeText(shortUrl).then(() => {
        copyBtn.innerText = "✓ クリップボードにコピーしました！";
        copyBtn.style.background = "#059669";
        
        setTimeout(() => {
            copyBtn.innerText = "URLをクリップボードにコピー";
            copyBtn.style.background = "#10b981";
        }, 2000);
    });
});

// ダウンロードボタンの処理
document.getElementById('downloadBtn').addEventListener('click', () => {
    const qrcodeDiv = document.getElementById('qrcode');
    const img = qrcodeDiv.querySelector('img');
    const canvas = qrcodeDiv.querySelector('canvas');
    let downloadUrl = "";

    if (img && img.src) {
        downloadUrl = img.src;
    } else if (canvas) {
        downloadUrl = canvas.toDataURL("image/png");
    }

    if (downloadUrl) {
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = 'short-qrcode.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    } else {
        alert('QRコードの画像データが見つかりません。');
    }
});
</script>
</body>
</html>
