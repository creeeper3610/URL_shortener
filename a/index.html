<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script>
    // ブラウザが画面（Body）を描画し始める前に、このスクリプトが最優先・最速で実行されます
    function safeDecode(str) {
        let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(escape(atob(base64)));
    }

    const searchString = window.location.search; 
    let encodeLink = null;
    
    if (searchString.startsWith('?=')) {
        encodeLink = searchString.substring(2);
    } else if (searchString.startsWith('?')) {
        encodeLink = searchString.substring(1);
    }

    if (encodeLink) {
        try {
            const decodedText = safeDecode(encodeLink);
            let targetUrl = "";

            // 先頭に通信フラグ（s| または h|）があるかチェック
            if (decodedText.startsWith("s|")) {
                targetUrl = "https://" + decodedText.substring(2);
            } else if (decodedText.startsWith("h|")) {
                targetUrl = "http://" + decodedText.substring(2);
            } else {
                // 過去に作ったフラグなしの古い短縮リンク（'エンコード後のリンク'だけ）の場合も、
                // 壊さずにそのまま https:// でアクセスできるようにして互換性を100%維持します
                targetUrl = "https://" + decodedText;
            }

            // 1ミリ秒の遅延もなく即座にリダイレクト
            window.location.replace(targetUrl);
        } catch (e) {
            alert("URLの解析に失敗しました。");
        }
    }
    </script>
</head>
</html>
