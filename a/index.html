<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script>
    // ★ここにも「絶対にURLで壊れない66文字」のマスターリストを定義
    const BASE66_CHARS = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-._~";

    // ★ガチの66進数(Base66)デコード処理
    function decodeBase66(str) {
        let num = 0n;
        for (let i = 0; i < str.length; i++) {
            const index = BASE66_CHARS.indexOf(str[i]);
            if (index === -1) return null;
            num = num * 66n + BigInt(index);
        }
        const bytes = [];
        while (num > 0n) {
            bytes.unshift(Number(num & 0xFFn));
            num = num >> 8n;
        }
        const decoder = new TextDecoder();
        return decoder.decode(new Uint8Array(bytes));
    }

    const searchString = window.location.search; 
    let encodeLink = null;
    
    if (searchString.startsWith('?=')) {
        encodeLink = searchString.substring(2);
    } else if (searchString.startsWith('?')) {
        encodeLink = searchString.substring(1);
    }

    if (encodeLink) {
        try {
            // 66進数として解読
            const decodedText = decodeBase66(encodeLink);
            let targetUrl = "";

            if (decodedText.startsWith("s|")) {
                targetUrl = "https://" + decodedText.substring(2);
            } else if (decodedText.startsWith("h|")) {
                targetUrl = "http://" + decodedText.substring(2);
            } else {
                targetUrl = "https://" + decodedText;
            }

            window.location.replace(targetUrl);
        } catch (e) {
            alert("URLの解析に失敗しました。");
        }
    }
    </script>
</head>
</html>
