<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページを移動しています...</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; color: #333; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>ページを移動しています...</h2>
    <div class="spinner"></div>

    <script>
    // 暗号化された文字列を元のURL（記号も含む）に完全に復元する処理
    function safeDecode(str) {
        let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) { base64 += '='; }
        return decodeURIComponent(escape(atob(base64)));
    }

    window.addEventListener('DOMContentLoaded', () => {
        // URLの末尾の「?=[暗号データ]」から、ブラウザのバグを回避して生データを直接引っこ抜く
        const searchString = window.location.search; 
        let encodeLink = null;
        
        if (searchString.startsWith('?=')) {
            encodeLink = searchString.substring(2); // 先頭の "?=" の2文字を削る
        } else if (searchString.startsWith('?')) {
            // サーバー環境によって万が一「?データ」の形で届いた場合のセーフティ
            encodeLink = searchString.substring(1);
        }

        if (encodeLink) {
            try {
                // デコードして元のドメイン＋パラメータを復元
                const originalText = safeDecode(encodeLink);
                
                // 開く瞬間だけ自動で頭に https:// を補完してブラウザに移行させる
                const targetUrl = 'https://' + originalText;
                
                // 履歴を残さず綺麗にジャンプ
                window.location.replace(targetUrl);
            } catch (e) {
                document.body.innerHTML = "<h2>エラー</h2><p>URLの解析に失敗しました。リンクが壊れている可能性があります。</p>";
            }
        } else {
            document.body.innerHTML = "<h2>エラー</h2><p>パラメータ（?=[データ]）が見つかりません。</p>";
        }
    });
    </script>
</body>
</html>
