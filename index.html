<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL短縮・転送システム【確定版】</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #e9ecef; border-left: 5px solid #28a745; word-break: break-all; }
        .prefix { color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div id="app" class="container">
    <p>読み込み中...</p>
</div>

<script>
// --- 安全なエンコード・デコード処理 ---
// 入力されたURL内の . / % などの記号や日本語を100%安全に保護して変換する
function safeEncode(str) {
    return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function safeDecode(str) {
    let base64 = str.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) { base64 += '='; }
    return decodeURIComponent(escape(atob(base64)));
}

// 自分のサイトのベースURLを取得
function getBaseUrl() {
    return window.location.origin + window.location.pathname.replace(/\/$/, "");
}

// --- メイン処理 ---
window.addEventListener('DOMContentLoaded', () => {
    const app = document.getElementById('app');
    
    // 【超重要】URLの「?=[データ]」から、ブラウザのバグを回避して確実にデータを抜き出す
    const searchString = window.location.search; 
    let encodeLink = null;
    
    if (searchString.startsWith('?=')) {
        encodeLink = searchString.substring(2); // "?=" の2文字を削ってデータだけを無傷で抽出
    }

    // 【転送モード】パラメータが存在する場合
    if (encodeLink) {
        app.innerHTML = "<h2>ページを移動しています...</h2>";
        try {
            // 元の文字列（://google.com... 等）を完全復元
            const originalText = safeDecode(encodeLink);
            
            // 開く瞬間だけ自動で https:// を補完してブラウザにサイトを移行させる
            const targetUrl = 'https://' + originalText;
            window.location.replace(targetUrl);
        } catch (e) {
            app.innerHTML = "<h2>エラー</h2><p>URLの解析に失敗しました。リンクが壊れている可能性があります。</p>";
        }
        return;
    }

    // 【生成モード】パラメータがない場合
    app.innerHTML = `
        <h2>URL短縮エンコーダー</h2>
        <p>URLに含まれる記号（. / _ - %）も安全に処理します。</p>
        <span class="prefix">https://</span>
        <input type="text" id="urlInput" placeholder="://google.com%" />
        <button id="generateBtn">エンコードする</button>
        <div id="resultArea" style="display:none;"></div>
    `;

    const urlInput = document.getElementById('urlInput');
    const generateBtn = document.getElementById('generateBtn');
    const resultArea = document.getElementById('resultArea');

    generateBtn.addEventListener('click', () => {
        let rawInput = urlInput.value.trim();
        if (!rawInput) {
            alert('入力してください');
            return;
        }

        // ユーザーが https:// を入力してしまっていたら自動で削る
        rawInput = rawInput.replace(/^https?:\/\//i, '');

        try {
            // 安全にエンコードを実行
            const compressed = safeEncode(rawInput);
            
            // ご希望通りの /a?=エンコード後のリンク 形式を生成
            const shortUrl = `${getBaseUrl()}/a?=${compressed}`;

            resultArea.style.display = 'block';
            resultArea.innerHTML = `
                <p><strong>エンコードに成功しました！</strong></p>
                <div class="result">
                    <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                </div>
            `;
        } catch (e) {
            alert('エラーが発生しました。');
        }
    });
});
</script>

</body>
</html>
