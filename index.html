<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL短縮エンコーダー</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: #f9f9f9; }
        .input-group { display: flex; align-items: center; margin: 10px 0; }
        select { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; background: #fff; }
        input[type="text"] { flex: 1; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 0 4px 4px 0; }
        button { width: 100%; background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; background: #e9ecef; border-left: 5px solid #28a745; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>URL短縮エンコーダー</h2>
    <p>URLに含まれる記号（. / _ - %）も安全に処理します。http/httpsを正しく選択してください。</p>
    
    <div class="input-group">
        <select id="protocolSelect">
            <option value="https://">https://</option>
            <option value="http://">http://</option>
        </select>
        <input type="text" id="urlInput" placeholder="www.city.akishima.ed.jp/~haijima/" />
    </div>
    
    <button id="generateBtn">エンコードする</button>
    <div id="resultArea" style="display:none;"></div>
</div>

<script>
function safeEncode(str) {
    return btoa(unescape(encodeURIComponent(str)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ユーザーが入力欄に直接「http://」などをコピペしたときの自動クリーンアップ
document.getElementById('urlInput').addEventListener('input', (e) => {
    let value = e.target.value.trim();
    if (/^https:\/\//i.test(value)) {
        document.getElementById('protocolSelect').value = "https://";
        e.target.value = value.replace(/^https:\/\//i, '');
    } else if (/^http:\/\//i.test(value)) {
        document.getElementById('protocolSelect').value = "http://";
        e.target.value = value.replace(/^http:\/\//i, '');
    }
});

document.getElementById('generateBtn').addEventListener('click', () => {
    const urlInput = document.getElementById('urlInput');
    const protocolSelect = document.getElementById('protocolSelect');
    const resultArea = document.getElementById('resultArea');
    let rawInput = urlInput.value.trim();
    
    if (!rawInput) {
        alert('入力してください');
        return;
    }

    // 重複してプロトコルが入らないように念のため再度掃除
    rawInput = rawInput.replace(/^https?:\/\//i, '');

    try {
        // 【重要】選ばれた通信（httpかhttpsか）の情報を、リンクの先頭に「s|」または「h|」という1文字のフラグとして埋め込む
        const protocolFlag = (protocolSelect.value === "https://") ? "s|" : "h|";
        const compressed = safeEncode(protocolFlag + rawInput);
        
        const currentPath = window.location.origin + window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
        const shortUrl = `${currentPath}/a?=${compressed}`;

        resultArea.style.display = 'block';
        resultArea.innerHTML = `
            <p><strong>エンコードに成功しました！</strong></p>
            <div class="result">
                <a href="${shortUrl}" target="_blank">${shortUrl}</a>
            </div>
        `;
    } catch (e) {
        alert('エラーが発生しました。');
    }
});
</script>
</body>
</html>
